name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Grant execute permission
        run: chmod +x gradlew

      - name: 🚀 Build All Debug Flavors
        # assembleDebug se APK banti h
        run: ./gradlew clean assembleDebug --no-daemon

      - name: 🔍 List APKs (Debug)
        # Isse log mein dikhega file kahan h
        run: find . -name "*.apk"

      - name: ✅ Final APK Download Button (Artifact)
        uses: actions/upload-artifact@v4
        with:
          # Is naam se tumhara download button dikhega
          name: AyushBrowser-Direct-APK 
          # Ye path ensure karta h ki sirf asli APK mile
          path: app/build/outputs/apk/**/debug/*.apk
          retention-days: 5
          
