name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Grant execute permission
        run: chmod +x gradlew

      - name: 🚀 Build All Debug Flavors
        # Clean build karna hamesha safe rehta h
        run: ./gradlew clean assembleDebug --no-daemon

      - name: 🔍 Check APK Location (Logs)
        # Isse humein log mein dikhega ki file asliyat mein kahan gayi
        run: find . -name "*.apk"

      - name: ✅ Final APK Download Button
        uses: actions/upload-artifact@v4
        with:
          name: AyushBrowser-Debug-Builds
          # Poore project mein search karega, ab miss hone ka sawal hi nahi h
          path: "**/*.apk"
          # Agar file na mile toh build fail ho jaye, taaki humein pata chale
          if-no-files-found: error 
          retention-days: 5
          
