name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🛠️ Grant execute permission
        run: chmod +x gradlew

      - name: 🚀 Build All Debug Flavors
        # '--quiet' ko hata diya h taaki compile error dikhe
        # '--no-daemon' runner ki memory bachata h
        run: ./gradlew clean assembleDebug --no-daemon

      - name: ✅ Upload APKs (All Flavors)
        uses: actions/upload-artifact@v4
        with:
          name: AyushBrowser-All-Flavors
          # '**/*.apk' poore project mein APK dhoond nikalega
          path: app/build/outputs/apk/**/*.apk
          retention-days: 5
          
