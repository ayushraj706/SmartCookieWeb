name: Build Ayush Privacy Browser

on:
  workflow_dispatch: # Manual build button ke liye
  push:
    branches: [ master ] # Jab bhi code push karo tab bhi build ho jaye

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Build zyada der na fase isliye timeout

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Gradle cache enable kiya h taaki build fast ho

      - name: 🛠️ Grant execute permission for gradlew
        run: chmod +x gradlew

      # --- 💾 GRADLE CACHE (Build fast karne ke liye) ---
      - name: 💾 Cache Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🚀 Build Debug APK
        run: ./gradlew assembleDebug --stacktrace # Stacktrace se error saaf dikhta h

      - name: ✅ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AyushBrowser-Debug-APK
          path: app/build/outputs/apk/debug/*.apk 
          retention-days: 7 # 7 din tak APK download kar sakoge
          
