name: Build Ayush Privacy Browser

on:
  workflow_dispatch: # Manual build button ke liye
  push:
    branches: [ master ] # Push par bhi chalega

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🛠️ Grant execute permission
        run: chmod +x gradlew

      - name: 🚀 Build Debug APK (Quiet Mode)
        # --quiet flag se faltu ke logs band ho jayenge
        # clean assembleDebug se purana kachra saaf ho jayega
        run: ./gradlew clean assembleDebug --quiet --no-daemon

      - name: ✅ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AyushBrowser-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          
